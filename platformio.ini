; PlatformIO Project Configuration File
; SML Display - WT32-ETH01 V1.4 (ESP32 + LAN8720 Ethernet)
; Board: WT32-ETH01 V1.4

[env:wt32-eth01]
platform = espressif32
board = wt32-eth01
framework = arduino
upload_protocol = esptool
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.filesystem = littlefs

; Partitionierung: App + LittleFS
board_build.partitions = default.csv

; Build-Flags
build_flags = 
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_ARDUHAL_LOG_COLORS=1
    ; Board-Kennung
    -D BOARD_WT32_ETH01=1

; Bibliotheken
lib_deps =
    ; Display
    https://github.com/adafruit/Adafruit-PCD8544-Nokia-5110-LCD-library.git
    https://github.com/adafruit/Adafruit-GFX-Library.git
    
    ; MQTT
    knolleary/PubSubClient@^2.8
    
    ; JSON Verarbeitung
    bblanchon/ArduinoJson@^7.2.0
    
    ; SML Parser (volkszaehler)
    https://github.com/volkszaehler/libsml.git
    
    ; Ethernet (ETH.h) – bereits im ESP32 Framework enthalten
    ; WiFi (WiFi.h) – bereits im ESP32 Framework enthalten
    ; DNSServer – bereits im ESP32 Framework enthalten
    ; LittleFS – bereits im ESP32 Framework enthalten
